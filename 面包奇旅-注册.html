const supabaseUrl='https://ojeykghutjkpugslsnso.supabase.co';const supabaseKey='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9qZXlrZ2h1dGprcHVnc2xzbnNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNTEwNTMsImV4cCI6MjA5MzgyNzA1M30.cs1pcmCRi5kd6c-pMxTBJ8GlfBEiWF8v3yHe5IJfp7k';const{createClient}=supabase;const supabaseClient=createClient(supabaseUrl,supabaseKey);let currentStep=0,selectedMethod='',privacyAgreed=false,notificationTimer=null,registeredDisplayAccount='';const initialLoading=document.getElementById('initialLoading'),methodSection=document.getElementById('methodSection'),accountSection=document.getElementById('accountSection'),passwordSection=document.getElementById('passwordSection'),successSection=document.getElementById('successSection'),overlay=document.getElementById('overlay'),prevBtn=document.getElementById('prevBtn'),nextBtn=document.getElementById('nextBtn'),notification=document.getElementById('notification'),notificationText=notification.querySelector('.notification-text'),notificationIcon=notification.querySelector('.notification-icon'),accountInput=document.getElementById('accountInput'),accountLabel=document.getElementById('accountLabel'),normalInputWrapper=document.getElementById('normalInputWrapper'),emailInputWrapper=document.getElementById('emailInputWrapper'),emailPrefixInput=document.getElementById('emailPrefixInput'),emailSuffix=document.getElementById('emailSuffix'),privacyCheckbox=document.getElementById('privacyCheckbox'),passwordInput=document.getElementById('passwordInput'),confirmPasswordInput=document.getElementById('confirmPasswordInput'),successAccountEl=document.getElementById('successAccount');window.onload=function(){setTimeout(()=>{initialLoading.classList.add('fade-out');setTimeout(()=>{initialLoading.classList.add('hidden');initialLoading.classList.remove('fade-out');methodSection.classList.remove('hidden');methodSection.classList.add('fade-in')},300)},4500)};function showNotification(message,type='error'){if(notificationTimer)clearTimeout(notificationTimer);notification.classList.remove('show');notification.classList.add('hiding');setTimeout(()=>{notification.classList.remove('hiding');notificationText.textContent=message;notification.className=`notification ${type}`;notificationIcon.textContent=type==='error'?'⚠':'✓';notification.offsetHeight;setTimeout(()=>notification.classList.add('show'),20);notificationTimer=setTimeout(()=>{notification.classList.remove('show');notification.classList.add('hiding')},3000)},notification.classList.contains('show')?300:10)}function showOverlay(duration){return new Promise(resolve=>{overlay.classList.add('active');setTimeout(()=>{overlay.classList.remove('active');resolve()},duration)})}function clearAllInputs(){accountInput.value='';emailPrefixInput.value='';passwordInput.value='';confirmPasswordInput.value='';emailSuffix.selectedIndex=0;updatePasswordHints()}function getCurrentAccountValue(){if(selectedMethod==='email')return emailPrefixInput.value.trim();return accountInput.value.trim()}document.querySelectorAll('.method-btn').forEach(btn=>{btn.addEventListener('click',async function(){selectedMethod=this.dataset.method;await showOverlay(800);methodSection.classList.add('fade-out');setTimeout(()=>{methodSection.classList.add('hidden');methodSection.classList.remove('fade-out');accountSection.classList.remove('hidden');accountSection.classList.add('fade-in');if(selectedMethod==='email'){normalInputWrapper.classList.add('hidden');emailInputWrapper.classList.remove('hidden')}else{normalInputWrapper.classList.remove('hidden');emailInputWrapper.classList.add('hidden');if(selectedMethod==='username')accountLabel.textContent='请输入您的用户名';else if(selectedMethod==='phone')accountLabel.textContent='请输入您的手机号'}prevBtn.classList.remove('hidden');nextBtn.classList.remove('hidden');currentStep=1;updateNextButton()},300)})});privacyCheckbox.addEventListener('click',function(){privacyAgreed=!privacyAgreed;this.classList.toggle('checked',privacyAgreed);updateNextButton()});function updateNextButton(){if(currentStep===1){const hasInput=getCurrentAccountValue().length>0;nextBtn.classList.toggle('active',hasInput&&privacyAgreed)}else if(currentStep===2){const hasPassword=passwordInput.value.length>0;const hasConfirm=confirmPasswordInput.value.length>0;nextBtn.classList.toggle('active',hasPassword&&hasConfirm)}}accountInput.addEventListener('input',updateNextButton);emailPrefixInput.addEventListener('input',updateNextButton);passwordInput.addEventListener('input',()=>{updatePasswordHints();updateNextButton()});confirmPasswordInput.addEventListener('input',updateNextButton);function updatePasswordHints(){const password=passwordInput.value;const hint1=document.getElementById('hint1');if(password.length>=6){hint1.textContent='✓';hint1.className='hint-icon valid'}else{hint1.textContent='✗';hint1.className='hint-icon invalid'}const hint2=document.getElementById('hint2');const hasLetter=/[a-zA-Z]/.test(password);const hasNumber=/[0-9]/.test(password);if(hasLetter&&hasNumber){hint2.textContent='✓';hint2.className='hint-icon valid'}else{hint2.textContent='✗';hint2.className='hint-icon invalid'}const hint3=document.getElementById('hint3');if(/[A-Z]/.test(password)){hint3.textContent='✓';hint3.className='hint-icon valid'}else{hint3.textContent='✗';hint3.className='hint-icon invalid'}}prevBtn.addEventListener('click',async function(){await showOverlay(500);clearAllInputs();if(currentStep===1){accountSection.classList.add('fade-out');setTimeout(()=>{accountSection.classList.add('hidden');accountSection.classList.remove('fade-out');methodSection.classList.remove('hidden');methodSection.classList.add('fade-in');prevBtn.classList.add('hidden');nextBtn.classList.add('hidden');currentStep=0;privacyAgreed=false;privacyCheckbox.classList.remove('checked')},300)}else if(currentStep===2){passwordSection.classList.add('fade-out');setTimeout(()=>{passwordSection.classList.add('hidden');passwordSection.classList.remove('fade-out');accountSection.classList.remove('hidden');accountSection.classList.add('fade-in');currentStep=1;updateNextButton()},300)}else if(currentStep===3){successSection.classList.add('fade-out');setTimeout(()=>{successSection.classList.add('hidden');successSection.classList.remove('fade-out');passwordSection.classList.remove('hidden');passwordSection.classList.add('fade-in');nextBtn.classList.remove('hidden');currentStep=2;updateNextButton()},300)}});nextBtn.addEventListener('click',handleNext);async function handleNext(){if(currentStep===1){const accountValue=getCurrentAccountValue();if(!accountValue){await showOverlay(600);showNotification('请输入账号信息');return}if(!privacyAgreed){await showOverlay(600);showNotification('请同意《WheatSong 用户隐私政策》');return}if(selectedMethod==='phone'){if(!/^\d+$/.test(accountValue)){await showOverlay(600);showNotification('手机号只能包含数字');return}}if(selectedMethod==='email'){if(!/^[a-zA-Z0-9._-]+$/.test(accountValue)){await showOverlay(600);showNotification('邮箱前缀只能包含字母、数字、点、下划线和横线');return}}await showOverlay(600);accountSection.classList.add('fade-out');setTimeout(()=>{accountSection.classList.add('hidden');accountSection.classList.remove('fade-out');passwordSection.classList.remove('hidden');passwordSection.classList.add('fade-in');currentStep=2;updateNextButton()},300)}else if(currentStep===2){const password=passwordInput.value;const confirmPassword=confirmPasswordInput.value;if(!password){await showOverlay(600);showNotification('请输入密码');return}if(!confirmPassword){await showOverlay(600);showNotification('请再次确认密码');return}if(password!==confirmPassword){await showOverlay(600);showNotification('两次输入的密码不一致');return}const accountValue=getCurrentAccountValue();let email=accountValue;let displayAccount='';if(selectedMethod==='username'){email+='@username.wheatsong';displayAccount=accountValue}else if(selectedMethod==='phone'){email+='@phonenumber.wheatsong';displayAccount=accountValue}else{email+=emailSuffix.value;displayAccount=email}registeredDisplayAccount=displayAccount;overlay.classList.add('active');try{const{data,error}=await supabaseClient.auth.signUp({email:email,password:password});overlay.classList.remove('active');if(error){showNotification(error.message)}else{showNotification('已成功注册此账号','success');passwordSection.classList.add('fade-out');setTimeout(()=>{passwordSection.classList.add('hidden');passwordSection.classList.remove('fade-out');successAccountEl.textContent='本次注册的账号：'+registeredDisplayAccount;successSection.classList.remove('hidden');successSection.classList.add('fade-in');nextBtn.classList.add('hidden');currentStep=3},300)}}catch(err){overlay.classList.remove('active');showNotification('注册失败，请稍后重试');console.error(err)}}}

document.addEventListener('keydown',function(event){if(event.key==='Enter'){if(!nextBtn.classList.contains('hidden')&&nextBtn.classList.contains('active')){event.preventDefault();handleNext()}}});
