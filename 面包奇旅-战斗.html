<script>
const supabaseClient=window.supabase.createClient('https://ojeykghutjkpugslsnso.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9qZXlrZ2h1dGprcHVnc2xzbnNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNTEwNTMsImV4cCI6MjA5MzgyNzA1M30.cs1pcmCRi5kd6c-pMxTBJ8GlfBEiWF8v3yHe5IJfp7k');

const searchStr = window.location.search.replace('?id=', '&id=');
const params = new URLSearchParams(searchStr);
const currentUserId = params.get('id');
let currentLevel = parseInt(params.get('level') || '1');
let currentExp = parseInt(params.get('exp') || '0');
let itemGoldenYeast = parseInt(params.get('golden_yeast') || '0');
let itemWheat = parseInt(params.get('wheat') || '0');

const audioPopup=new Audio('https://ojeykghutjkpugslsnso.supabase.co/storage/v1/object/sign/web/Audio/ConfirmationBox-Popup.mp3?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV9kMjg1NWJhZC1mNTQ0LTQ3YzMtODg2My0xY2Y0MWRjZThhZjciLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJ3ZWIvQXVkaW8vQ29uZmlybWF0aW9uQm94LVBvcHVwLm1wMyIsImlhdCI6MTc4MDEwODczNywiZXhwIjoyMDk1NDY4NzM3fQ.OllBPCe66KAXQ1BKWobBHqAWDGMy8Opk0qJ3Tb190UU');
const audioCancel=new Audio('https://ojeykghutjkpugslsnso.supabase.co/storage/v1/object/sign/web/Audio/ConfirmationBox-Cancel.mp3?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV9kMjg1NWJhZC1mNTQ0LTQ3YzMtODg2My0xY2Y0MWRjZThhZjciLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJ3ZWIvQXVkaW8vQ29uZmlybWF0aW9uQm94LUNhbmNlbC5tcDMiLCJpYXQiOjE3ODAxMDg4MDMsImV4cCI6MjA5NTQ2ODgwM30.87xuN9FS7LYfHfvnuf18CtEby9HdIPrBjhdzY-FVfPI');

const EXP_TABLE=[0,350,475,600,700,825,950,1075,1175,1300];
function getExpToNext(level){
if(level>=10)return null;
return EXP_TABLE[level];
}

const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

const stageEl=document.querySelector('.stage');
const wrapEl=document.querySelector('.wrap');
const progressArea=document.querySelector('.progress-area');
const progressMeter=document.querySelector('.progress-meter');
const progressFill=document.querySelector('.progress-fill');
const numGroup=document.getElementById('numGroup');
const numTexts=numGroup.querySelectorAll('text');
const offlineModal=document.getElementById('confirm-modal');
const offlineModalConfirmBtn=document.getElementById('modal-confirm-btn');
const offlineModalCancelBtn=document.getElementById('modal-cancel-btn');

function showOfflineModal(){
if(offlineModal.classList.contains('active'))return;
offlineModal.classList.add('active');
audioPopup.currentTime=0;
audioPopup.play().catch(()=>{});
}
function hideOfflineModal(){
offlineModal.classList.remove('active');
audioCancel.currentTime=0;
audioCancel.play().catch(()=>{});
}

offlineModalConfirmBtn.addEventListener('click',hideOfflineModal);
offlineModalCancelBtn.addEventListener('click',hideOfflineModal);

function setNumber(value){
numTexts.forEach(t=>{t.textContent=value;});
}
function resetNumber(){
numGroup.style.transition='none';
numGroup.style.transform='scale(1)';
numGroup.style.opacity='1';
setNumber(currentLevel);
void numGroup.offsetWidth;
}
function resetProgress(){
progressArea.classList.remove('active');
progressArea.classList.remove('show-bottom');
progressArea.classList.remove('show-top');
progressMeter.style.transition='none';
progressFill.style.transition='none';
progressMeter.style.width='0px';
progressFill.style.width='0%';
void progressMeter.offsetWidth;
progressMeter.style.transition='width 0.45s ease';
progressFill.style.transition='width 0.7s ease';
}

function syncProgressPosition(){
const stageRect=stageEl.getBoundingClientRect();
const wrapRect=wrapEl.getBoundingClientRect();
progressArea.style.left=wrapRect.left-stageRect.left+wrapRect.width/2+'px';
progressArea.style.top=wrapRect.bottom-stageRect.top+5+'px';
requestAnimationFrame(syncProgressPosition);
}
syncProgressPosition();

async function _playExpAnimCore(oldExp,newExp,level){
const maxExp=getExpToNext(level);
const max=maxExp!==null?maxExp:newExp;
resetProgress();
resetNumber();
const topText=progressArea.querySelector('.progress-text.top');
const bottomText=progressArea.querySelector('.progress-text.bottom');
topText.textContent=oldExp+'/'+max;
bottomText.textContent='酵行阅历 +'+(newExp-oldExp);
wrapEl.classList.remove('animate');
wrapEl.classList.remove('show');
void wrapEl.offsetWidth;
wrapEl.classList.add('show');
await sleep(500);
await sleep(200);
progressFill.style.transition='none';
progressFill.style.width=(oldExp/max*100)+'%';
void progressFill.offsetWidth;
progressArea.classList.add('active');
progressMeter.style.width='180px';
await sleep(450);
await sleep(300);
progressArea.classList.add('show-bottom');
await sleep(100);
topText.textContent=newExp+'/'+max;
progressArea.classList.add('show-top');
progressFill.style.transition='width 0.7s ease';
progressFill.style.width=(newExp/max*100)+'%';
await sleep(700);
await sleep(500);
progressArea.classList.remove('show-top');
progressArea.classList.remove('show-bottom');
await sleep(250);
progressMeter.style.width='0px';
await sleep(450);
progressArea.classList.remove('active');
wrapEl.classList.remove('show');
await sleep(500);
resetProgress();
}

async function playLevelUpAndExpAnimation(oldLevel,newLevel,remainExp){
resetProgress();
setNumber(oldLevel);
numGroup.style.transition='none';
numGroup.style.transform='scale(1)';
numGroup.style.opacity='1';
void numGroup.offsetWidth;
wrapEl.classList.remove('animate');
wrapEl.classList.remove('show');
void wrapEl.offsetWidth;
wrapEl.classList.add('show');
await sleep(500);
await sleep(200);
numGroup.style.transition='opacity 0.15s ease';
numGroup.style.opacity='0';
await sleep(150);
setNumber(newLevel);
numGroup.style.transition='none';
numGroup.style.transform='scale(1.8)';
void numGroup.offsetWidth;
numGroup.style.transition='transform 0.4s ease, opacity 0.25s ease';
numGroup.style.opacity='1';
numGroup.style.transform='scale(1.25)';
await sleep(400);
await sleep(2000);
wrapEl.classList.remove('show');
await sleep(500);
currentLevel=newLevel;
currentExp=remainExp;
resetProgress();
resetNumber();
if(remainExp>0){
await _playExpAnimCore(0,remainExp,currentLevel);
}
}

async function playExpAnimation(oldExp,newExp,level){
resetProgress();
resetNumber();
await _playExpAnimCore(oldExp,newExp,level);
}

async function playLevelIntro(){
    resetProgress();
    resetNumber();
    stageEl.style.opacity = '1';
    wrapEl.style.opacity = '0';
    wrapEl.classList.remove('show');
    wrapEl.classList.remove('animate');
    void wrapEl.offsetWidth;
    wrapEl.classList.add('animate');
    await sleep(3000);
    wrapEl.style.opacity = '0';
    wrapEl.classList.remove('animate');
    wrapEl.classList.remove('show');
    stageEl.style.opacity = '0';
}

function createRipple(event) {
    const button = event.currentTarget;
    const ripple = document.createElement('div');
    ripple.className = 'ripple-effect';
    button.appendChild(ripple);
    setTimeout(() => {
        ripple.remove();
    }, 300);
}

document.querySelectorAll('.skill-btn').forEach(btn => {
    btn.addEventListener('click', createRipple);
});

async function init() {
if (!currentUserId) {
showOfflineModal();
currentLevel = 1;
currentExp = 0;
}
await playLevelIntro();
}

const bread = document.getElementById('bread-character');
let isDragging = false;
let dragOffset = { x: 0, y: 0 };

function initPosition() {
const cx = window.innerWidth / 4 - 45;
const cy = window.innerHeight / 2 - 30;
bread.style.left = cx + 'px';
bread.style.top = cy + 'px';
}
initPosition();
window.addEventListener('resize', initPosition);

bread.addEventListener('mousedown', startDrag);
bread.addEventListener('touchstart', startDrag);
document.addEventListener('mousemove', doDrag);
document.addEventListener('touchmove', doDrag);
document.addEventListener('mouseup', endDrag);
document.addEventListener('touchend', endDrag);

function startDrag(e) {
isDragging = true;
const clientX = e.touches ? e.touches[0].clientX : e.clientX;
const clientY = e.touches ? e.touches[0].clientY : e.clientY;
dragOffset.x = clientX - bread.offsetLeft;
dragOffset.y = clientY - bread.offsetTop;
bread.style.cursor = 'grabbing';
}

function doDrag(e) {
if (!isDragging) return;
e.preventDefault();
const clientX = e.touches ? e.touches[0].clientX : e.clientX;
const clientY = e.touches ? e.touches[0].clientY : e.clientY;
let newLeft = clientX - dragOffset.x;
let newTop = clientY - dragOffset.y;
newLeft = Math.max(0, Math.min(window.innerWidth - bread.offsetWidth, newLeft));
newTop = Math.max(0, Math.min(window.innerHeight - bread.offsetHeight, newTop));
bread.style.left = newLeft + 'px';
bread.style.top = newTop + 'px';
}

function endDrag() {
isDragging = false;
bread.style.cursor = 'grab';
}

init();
</script>
