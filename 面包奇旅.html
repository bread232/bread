async function fadeOutCurrentMusic(duration=300){
if(!currentMusicTrack||currentMusicTrack.paused)return;
const track=currentMusicTrack;
const steps=10;
const interval=duration/steps;
const startVol=track.volume;
for(let i=0;i<steps;i++){
track.volume=startVol*(1-(i+1)/steps);
await sleep(interval);
}
track.pause();
track.currentTime=0;

async function addExperience(amount){
if(currentLevel>=10)return;
const expNeeded=getExpToNext(currentLevel);
if(expNeeded===null)return;
const totalExp=currentExp+amount;
if(totalExp>=expNeeded){
const remainExp=totalExp-expNeeded;
const oldLevel=currentLevel;
const newLevel=oldLevel+1;
currentLevel=newLevel;
currentExp=remainExp;
await uploadAllData();
await playLevelUpAndExpAnimation(oldLevel,newLevel,remainExp);
}else{
const oldExp=currentExp;
currentExp=totalExp;
await uploadAllData();
await playExpAnimation(oldExp,currentExp,currentLevel);
}
}

};
}

function getItemQuantity(key){
return userItems[key]||0;

function buildItemList(category){
const items=[];
Object.keys(ITEM_DEFS).forEach(key=>{
const def=ITEM_DEFS[key];
const qty=getItemQuantity(key);
if(category==='currency'&&def.category!=='currency')return;
if(category==='quest'&&def.category!=='quest')return;
if(qty<=0)return;
items.push({key:key,name:def.name,rarity:def.rarity,category:def.category,typeLabel:def.typeLabel,imageUrl:def.imageUrl,description:def.description,quantity:qty});
});
items.sort((a,b)=>{
if(b.rarity!==a.rarity)return b.rarity-a.rarity;
return a.name.localeCompare(b.name,'zh-Hans-CN');
});
return items;
}

function renderDetail(item){

function startWindEffect(){

function triggerWindOnElements(){
const duration=1500+Math.random()*1000;

allBlades.forEach(blade=>{
try{
blade.animate([
{transform:'rotate(0deg)'},
{transform:'rotate('+bladeWindStrength+'deg)'},
{transform:'rotate(0deg)'},
{transform:'rotate(-'+bladeWindStrength+'deg)'},
{transform:'rotate(0deg)'}
],{
duration:duration,
iterations:1,
composite:'add',
easing:'ease-in-out'
});
}catch(e){
blade.style.transition='transform 0.3s ease-in-out';
blade.style.transform='rotate('+(bladeWindStrength*0.6)+'deg)';
setTimeout(()=>{
blade.style.transform='rotate(0deg)';
},duration*0.7);
}
});
allFlowers.forEach(flower=>{
try{
flower.animate([
{transform:'rotate(0deg)'},
{transform:'rotate('+flowerWindStrength+'deg)'},
{transform:'rotate(0deg)'},
{transform:'rotate(-'+flowerWindStrength+'deg)'},
{transform:'rotate(0deg)'}
],{
duration:duration,
iterations:1,
composite:'add',
easing:'ease-in-out'
});
}catch(e){
flower.style.transition='transform 0.3s ease-in-out';
flower.style.transform='rotate('+(flowerWindStrength*0.6)+'deg)';
setTimeout(()=>{
flower.style.transform='rotate(0deg)';
},duration*0.7);
}
});
}
function scheduleWind(){

setTimeout(()=>{
triggerWindOnElements();
const windDuration=1500+Math.random()*1000;
setTimeout(()=>{
scheduleWind();
},windDuration);
},delay);
}
scheduleWind();
}

function playDialogueSequence(dialogues){
return new Promise(resolve=>{
const overlay=document.getElementById('dialogue-overlay');
const dialogueContainer=document.getElementById('dialogue-container');
const inner=document.querySelector('.dialogue-inner');
const speakerEl=document.getElementById('dialogue-speaker-name');
const goldenLine=document.getElementById('dialogue-golden-line');
const textContent=document.getElementById('dialogue-text-content');
const promptDiamond=document.getElementById('dialogue-prompt-diamond');
let dialogueQueue=[...dialogues];
let isTyping=false;
let dialogueClickCounter=0;
let typewriterTimeout=null;
let isFirstLine=true;

isDialogueActive=true;
updateMusicVolume();

function processNextDialogue(){
if(typewriterTimeout)clearTimeout(typewriterTimeout);
promptDiamond.classList.remove('show');
dialogueClickCounter=0;
const dialogue=dialogueQueue.shift();
if(dialogue){
if(!isFirstLine){
playClickSound();
}else{
isFirstLine=false;
}
speakerEl.textContent=dialogue.speaker;
textContent.innerHTML='';
isTyping=true;
textContent.style.visibility='hidden';
textContent.innerHTML=dialogue.text;
const firstLineRect=textContent.getClientRects()[0];
const width=firstLineRect?firstLineRect.width:200;
goldenLine.style.width=`${width+20}px`;
textContent.innerHTML='';
textContent.style.visibility='visible';
typewriterEffect(dialogue.text,textContent,0);
}else{
endDialogueSequence();
}
}
function typewriterEffect(text,element,index){
if(index<text.length){
element.innerHTML+=text.charAt(index);
typewriterTimeout=setTimeout(()=>typewriterEffect(text,element,index+1),23);
}else{
isTyping=false;
}
}
function endDialogueSequence(){
playClickSound();
dialogueContainer.classList.remove('show');
overlay.classList.remove('visible');
dialogueClickCounter=0;
isTyping=false;
isDialogueActive=false;
updateMusicVolume();
setTimeout(()=>{resolve();},400);
}
function handleClick(){
if(!overlay.classList.contains('visible'))return;
if(isTyping)return;
if(dialogueClickCounter===0){
promptDiamond.textContent='◇';
promptDiamond.classList.add('show');
dialogueClickCounter=1;
}else if(dialogueClickCounter===1){
promptDiamond.textContent='◆';
playBurstAnimation(promptDiamond);
dialogueClickCounter=2;
setTimeout(()=>{
if(dialogueClickCounter===2)processNextDialogue();
},200);
}
}
const clickHandler=handleClick;
overlay.addEventListener('click',clickHandler);
const keyHandler=(e)=>{
if(e.key==='Enter'||e.key===' '||e.key.toLowerCase()==='f'){
if(overlay.classList.contains('visible')){
e.preventDefault();
handleClick();
}
}
};
document.addEventListener('keydown',keyHandler);
overlay.classList.add('visible');
setTimeout(()=>{
dialogueContainer.classList.add('show');
processNextDialogue();
},300);
const cleanup=()=>{
overlay.removeEventListener('click',clickHandler);
document.removeEventListener('keydown',keyHandler);
};
const origResolve=resolve;
resolve=function(){
cleanup();
origResolve();
};
});
}

function startDialogueAndStory(){
return new Promise(resolve=>{
const overlay=document.getElementById('dialogue-overlay');
const dialogueContainer=document.getElementById('dialogue-container');
const inner=document.querySelector('.dialogue-inner');
const speakerEl=document.getElementById('dialogue-speaker-name');
const goldenLine=document.getElementById('dialogue-golden-line');
const textContent=document.getElementById('dialogue-text-content');
const promptDiamond=document.getElementById('dialogue-prompt-diamond');
const dialogues=[
{speaker:"面包",text:"此处......空气中弥漫着陌异之气，吾究竟......身在何方？"},
{speaker:"面包",text:"记忆终了之时，吾尚在「虚假之天」潜心修行，缘何转瞬之间，便历经斗转星移，落于此荒芜之地？"},
{speaker:"面包",text:"不可，此非久留之地。吾须速寻归途，重返「虚假之天」，以竟未成之试炼。"},
{speaker:"面包",text:"然举目四望，周遭诸物皆陌生而诡谲......罢矣，既来之则安之，且先探查四方，再作决断。"}
];
let inDialogue=false;
let dialogueQueue=[];
let isTyping=false;
let dialogueClickCounter=0;
let typewriterTimeout=null;
let storyActiveTimeouts=[];
let isFirstLine=true;

function clearStoryTimeouts(){
storyActiveTimeouts.forEach(t=>clearTimeout(t));
storyActiveTimeouts=[];
}
function resetStoryElements(){
document.getElementById('story-chapter-info').classList.remove('visible');
document.getElementById('story-main-title').classList.remove('visible');
document.getElementById('story-divider').classList.remove('visible');
document.getElementById('story-unlocked-status').classList.remove('visible');
}
async function showTaskFrame(){
const storyOverlay=document.getElementById('story-display-overlay');
clearStoryTimeouts();
resetStoryElements();
await showSectionStartFrame('0_1_1_1');
resolve();
}
function processNextDialogue(){
if(typewriterTimeout)clearTimeout(typewriterTimeout);
promptDiamond.classList.remove('show');
dialogueClickCounter=0;
const dialogue=dialogueQueue.shift();
if(dialogue){
if(!isFirstLine){
playClickSound();
}else{
isFirstLine=false;
}
speakerEl.textContent=dialogue.speaker;
textContent.innerHTML='';
isTyping=true;
textContent.style.visibility='hidden';
textContent.innerHTML=dialogue.text;
const firstLineRect=textContent.getClientRects()[0];
const width=firstLineRect?firstLineRect.width:200;
goldenLine.style.width=`${width+20}px`;
textContent.innerHTML='';
textContent.style.visibility='visible';
typewriterEffect(dialogue.text,textContent,0);
}else{
endDialogueSequence();
}
}
function typewriterEffect(text,element,index){
if(index<text.length){
element.innerHTML+=text.charAt(index);
typewriterTimeout=setTimeout(()=>typewriterEffect(text,element,index+1),23);
}else{
isTyping=false;
}
}
function endDialogueSequence(){
playClickSound();
inDialogue=false;
dialogueContainer.classList.remove('show');
overlay.classList.remove('visible');
dialogueClickCounter=0;
isTyping=false;
isDialogueActive=false;
updateMusicVolume();
setTimeout(()=>{showTaskFrame();},100);
}
function handleClick(){
if(!inDialogue)return;
if(isTyping)return;
if(dialogueClickCounter===0){
promptDiamond.textContent='◇';
promptDiamond.classList.add('show');
dialogueClickCounter=1;
}else if(dialogueClickCounter===1){
promptDiamond.textContent='◆';
playBurstAnimation(promptDiamond);
dialogueClickCounter=2;
setTimeout(()=>{
if(dialogueClickCounter===2)processNextDialogue();
},200);
}
}
overlay.addEventListener('click',handleClick);
document.addEventListener('keydown',(e)=>{
if(e.key==='Enter'||e.key===' '||e.key.toLowerCase()==='f'){
if(inDialogue){
e.preventDefault();
handleClick();
}
}
});
isDialogueActive=true;
updateMusicVolume();
inDialogue=true;
overlay.classList.add('visible');
setTimeout(()=>{
dialogueContainer.classList.add('show');
dialogueQueue=[...dialogues];
processNextDialogue();
},300);
});
}
